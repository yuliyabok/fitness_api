services:
  - type: web
    name: fitness-api
    runtime: docker
    plan: starter
    region: frankfurt
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 120
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: fitness-db
    plan: basic-256mb
    region: frankfurt
    databaseName: fitness_app
    user: fitness_app
    ipAllowList: []
