# Файл: локальный docker-compose для backend и PostgreSQL.

services:
  postgres:
    image: postgres:16-alpine
    container_name: fitness-api-postgres
    environment:
      POSTGRES_DB: fitness
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
    container_name: fitness-api-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://fitness:fitness@postgres:5432/fitness
      JWT_SECRET: dev-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      CORS_ORIGINS: "*"
      PORT: 8000
    ports:
      - "8000:8000"

volumes:
  postgres_data:
